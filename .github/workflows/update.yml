name: Update All Map Data

on:
  workflow_dispatch: # Кнопка для ручной проверки/запуска
  schedule:
    - cron: '0 0 1 * *' # Автозапуск 1-го числа каждого месяца

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем репозиторий
        uses: actions/checkout@v4

      - name: Настраиваем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Устанавливаем библиотеки
        run: pip install requests

      - name: Запускаем парсер поликлиник
        run: python update_points.py

      - name: Запускаем парсер Дринкит
        run: python update_drinkit.py

      - name: Сохраняем результат в репозиторий
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add polyclinics.json drinkit.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update map points (polyclinics + drinkit)" && git push)
