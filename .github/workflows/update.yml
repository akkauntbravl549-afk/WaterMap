name: Update Polyclinics JSON

on:
  workflow_dispatch: # Кнопка для ручного запуска
  schedule:
    - cron: '0 0 1 * *' # Автозапуск первого числа каждого месяца

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем репозиторий
        uses: actions/checkout@v4

      - name: Настраиваем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Устанавливаем библиотеки
        run: pip install requests

      - name: Запускаем парсер
        run: python update_points.py

      - name: Сохраняем результат в репозиторий
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add polyclinics.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update polyclinics.json" && git push)
