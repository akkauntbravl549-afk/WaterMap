<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта бесплатной воды</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=04aa77c3-e464-422b-aaea-6d9d6ed556a0&lang=ru_RU" type="text/javascript"></script>
    <style>
        body, html { padding: 0; margin: 0; width: 100%; height: 100%; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        ymaps.ready(init);

        function init() {
            var myMap = new ymaps.Map("map", {
                center: [55.751574, 37.573856],
                zoom: 10,
                controls: ['zoomControl', 'geolocationControl']
            });

            var clusterer = new ymaps.Clusterer({
                preset: 'islands#violetClusterIcons',
                groupByCoordinates: false,
                clusterDisableClickZoom: false,
                clusterHideIconOnBalloonOpen: false,
                geoObjectHideIconOnBalloonOpen: false
            });

            var geoObjects = [];

            // 1. РУЧНЫЕ ТОЧКИ
            var manualPoints = [
                {
                    coordinates: [55.868368, 37.491889],
                    title: "Кулер в женской поликлинике",
                    description: "Вода: Отличная<br>Стаканчики: Есть<br>Рейтинг: 5/5"
                },
                {
                    coordinates: [55.875610, 37.485060],
                    title: "Фотка на паспорт",
                    description: "Вода: Обычная<br>Стаканчики: Есть<br>Рейтинг: 5/5"
                },
                {
                    coordinates: [55.878593, 37.479364],
                    title: "1руб Дринкит",
                    description: "Вода: Отличная<br>Стаканчики:Заебись<br>Обслуживание: не называют по имени<br>Рейтинг: 4/5"
                }
            ];

            manualPoints.forEach(function(pt) {
                var placemark = new ymaps.Placemark(pt.coordinates, {
                    balloonContentHeader: pt.title,
                    balloonContentBody: pt.description
                }, {
                    preset: 'islands#violetWaterCircleIcon'
                });
                geoObjects.push(placemark);
            });

            // 2. АВТО-ТОЧКИ ИЗ JSON
            Promise.all([
                fetch('polyclinics.json').then(res => res.ok ? res.json() : []).catch(() => []),
                fetch('drinkit.json').then(res => res.ok ? res.json() : []).catch(() => [])
            ]).then(function([polyclinics, drinkit]) {

                // Поликлиники (медицинский крестик)
                polyclinics.forEach(function(pt) {
                    if (pt.lat && pt.lng) {
                        var placemark = new ymaps.Placemark([pt.lat, pt.lng], {
                            balloonContentHeader: pt.title,
                            balloonContentBody: '<b>Адрес:</b> ' + pt.address + '<br><b>Тип:</b> Поликлиника / Больница'
                        }, {
                            preset: 'islands#violetMedicalCircleIcon'
                        });
                        geoObjects.push(placemark);
                    }
                });

                // Дринкит (логотип с синим китом)
                drinkit.forEach(function(pt) {
                    if (pt.lat && pt.lng) {
                        var placemark = new ymaps.Placemark([pt.lat, pt.lng], {
                            balloonContentHeader: pt.title,
                            balloonContentBody: '<b>Адрес:</b> ' + pt.address + '<br><b>Тип:</b> Кофейня Дринкит'
                        }, {
                            iconLayout: 'default#image',
                            iconImageHref: 'drinkit.PNG', // Твой логотип кита из репозитория
                            iconImageSize: [32, 32],      // Размер маркер-картинки на карте
                            iconImageOffset: [-16, -16]    // Смещение для точного центрирования
                        });
                        geoObjects.push(placemark);
                    }
                });

                clusterer.add(geoObjects);
                myMap.geoObjects.add(clusterer);
            });
        }
    </script>
</body>
</html>
